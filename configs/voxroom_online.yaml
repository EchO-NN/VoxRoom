project:
  name: voxroom_online_interioragent
  seed: 123
  output_dir: result
paths:
  interioragent_root: /path/to/InteriorAgent
  isaac_sim_root: /path/to/isaac-sim-standalone-5.1.0-linux-x86_64
repo:
  backend: python
  detector: none
  planner: astar
  use_original_scenegraph: false
benchmark:
  strict_benchmark: false
  allow_debug_fallbacks: true
  policy: roomseg_random_frontier
  ablation_name: ''
visualization:
  voxroom_popup: false
  voxroom_popup_every_steps: 1
  voxroom_popup_save_dir: null
  voxroom_popup_save_every_steps: 10
  voxroom_popup_width: 1440
  voxroom_popup_height: 900
  voxroom_popup_jpeg_quality: 75
  debug_overlay_layers: true
  save_overlay_layer_metadata: true
  show_gt_goal_cells: false
  show_room_proposals: true
  show_room_masks: true
  show_room_labels: true
  show_frontier_member_cells: true
  show_object_nodes: true
  show_candidate_markers: true
  max_green_like_primitives_before_warning: 200
isaac:
  headless: true
  control_dt: 0.2
  perception_every_steps: 1
  observed_radius_m: 3.0
  render_updates_per_step: 1
  read_depth: true
  camera_annotator_device: cuda
dataset:
  root: /path/to/InteriorAgent
  scene_glob: kujiale_*
  preprocessed_dir: data/interioragent_preprocessed
  episodes_dir: data/interioragent_episodes
  rooms_json_name: rooms.json
  top_level_usd_pattern: '*.usd*'
scene_preprocess:
  map_resolution_m: 0.05
  robot_radius_m: 0.05
  inflation_radius_m: 0.0
  min_object_bbox_diag_m: 0.05
  include_large_furniture_as_goals: true
  exclude_categories:
  - wall
  - floor
  - ceiling
  - roof
  - door
  - window
  - other
  - baseboard
  - light_switch
  - outlet
episodes:
  episodes_per_scene: 100
  min_start_goal_distance_m: 1.5
  max_start_goal_distance_m: 25.0
  min_start_object_clearance_m: 0.8
  min_start_goal_bbox_distance_m: 1.5
  min_goal_clearance_m: 0.8
  min_planning_clearance_m: 0.0
  success_distance_m: 0.2
  success_requires_stop: false
  success_requires_visible: false
  max_steps: 500
  max_time_s: 300
  max_path_length_m: 80.0
  max_attempts_per_episode: 2000
  yaw_sampling: uniform
  balance_goal_categories: true
robot:
  name: kaya
  usd_path: ${ISAAC_ASSETS}/Isaac/Robots/NVIDIA/Kaya/kaya.usd
  base_frame: base_link
  camera_frame: camera_rgbd
  spawn_height_m: 0.05
  max_vx_mps: 0.15
  max_vy_mps: 0.15
  max_wz_radps: 0.35
  cmd_hz: 10
  footprint_width_m: 0.1
  footprint_radius_m: 0.05
camera:
  width: 640
  height: 480
  hfov_deg: 110.0
  mast_height_m: 1.35
  forward_offset_m: 0.0
  pitch_deg: 0.0
  near_m: 0.02
  far_m: 10.0
  publish_hz: 5
nearfield_depth:
  enabled: false
  width: 192
  height: 192
  hfov_deg: 115.0
  height_m: 1.15
  near_m: 0.02
  far_m: 1.8
  radius_m: 1.2
  ignore_radius_m: 0.05
  depth_stride_px: 3
  floor_tolerance_m: 0.12
  obstacle_min_height_m: 0.18
  obstacle_max_height_m: 0.9
  splat_point_threshold: 2
  free_splat_point_threshold: 1
nearfield_static_map:
